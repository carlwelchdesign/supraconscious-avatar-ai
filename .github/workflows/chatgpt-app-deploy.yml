name: ChatGPT App Deployment

on:
  push:
    branches:
      - main
      - release/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://inner_avatar:inner_avatar_dev@localhost:5432/inner_avatar?sslmode=disable
      AUTH_SECRET: chatgpt-ci-auth-secret
      OPENAI_API_KEY: ""
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      INNER_AVATAR_WEB_URL: http://localhost:3000
      NEXT_PUBLIC_ADMIN_URL: http://localhost:3001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Verify Yarn
        run: yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Validate environment template
        run: yarn check:env

      - name: Build chatgpt app
        run: yarn --cwd apps/chatgpt-app build

      - name: Run chatgpt app tests
        run: yarn --cwd apps/chatgpt-app test

      - name: Validate Docker Compose config
        run: yarn docker:compose:config

      - name: Build Docker image
        run: docker build -f apps/chatgpt-app/Dockerfile -t inner-avatar-chatgpt-app:${{ github.sha }} .
