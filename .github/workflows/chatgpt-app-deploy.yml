name: ChatGPT App Deployment

on:
  push:
    branches:
      - main
      - release/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build chatgpt app
        run: yarn --cwd apps/chatgpt-app build

      - name: Run chatgpt app tests
        run: yarn --cwd apps/chatgpt-app test

      - name: Build Docker image
        run: docker build -f apps/chatgpt-app/Dockerfile -t inner-avatar-chatgpt-app:${{ github.sha }} .

      - name: Login to GitHub Container Registry
        if: secrets.GHCR_PAT
        uses: docker/login-action@v5
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Push Docker image to GHCR
        if: secrets.GHCR_PAT
        run: |
          docker tag inner-avatar-chatgpt-app:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/inner-avatar-chatgpt-app:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/inner-avatar-chatgpt-app:${{ github.sha }}
