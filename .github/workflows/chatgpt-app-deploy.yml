name: ChatGPT App Deployment

on:
  push:
    branches:
      - main
      - release/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://inner_avatar:inner_avatar_dev@localhost:5432/inner_avatar?sslmode=disable
      AUTH_SECRET: chatgpt-ci-auth-secret
      OPENAI_API_KEY: ""
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      INNER_AVATAR_WEB_URL: http://localhost:3000
      NEXT_PUBLIC_ADMIN_URL: http://localhost:3001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Use repository Yarn launcher
        run: node .yarn/releases/yarn-4.cjs --version || true

      - name: Install dependencies
        run: node .yarn/releases/yarn-4.cjs install --immutable

      - name: Build chatgpt app
        run: node .yarn/releases/yarn-4.cjs --cwd apps/chatgpt-app build

      - name: Run chatgpt app tests
        run: node .yarn/releases/yarn-4.cjs --cwd apps/chatgpt-app test

      - name: Build Docker image
        run: docker build -f apps/chatgpt-app/Dockerfile -t inner-avatar-chatgpt-app:${{ github.sha }} .

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v5
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Push Docker image to GHCR
        run: |
          docker tag inner-avatar-chatgpt-app:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/inner-avatar-chatgpt-app:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/inner-avatar-chatgpt-app:${{ github.sha }}
